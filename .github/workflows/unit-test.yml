name: Unit Tests
on:
  pull_request:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'mkdocs.yml'
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'mkdocs.yml'

jobs:
  node_matrix:
    uses: appium/appium-workflows/.github/workflows/node-lts-matrix.yml@main

  test:
    runs-on: ubuntu-latest
    needs:
      - node_matrix
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.node_matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v3
        with:
          node-version: ${{ matrix.node-version }}
      - uses: SocketDev/action@v1
        with:
          mode: firewall-free
      - run: sfw npm install --no-package-lock
        name: Install dev dependencies
      - run: npm run lint
        name: Run linter
      - run: npm run format:check
        name: Run Prettier check
      - run: npm run test
        name: Unit Tests
